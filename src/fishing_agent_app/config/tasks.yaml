analyze_weather_task:
  description: >
    Review the current weather, wind, and atmospheric trends for {target_fish} in a {environment} context.
  expected_output: >
    A concise summary of how these specific conditions will impact the target species' activity level and depth placement.

check_regulations_task:
  description: >
    Analyze the target framework parameter: {environment}. 
    If the environment asks to suggest hotspots, you MUST provide a clear, bulleted list of 3 specific, named local bodies of water.
    If a single specific lake or water body is already provided, you MUST focus entirely on that water body. Look up the specific fishing regulations for taking {target_fish} in that water within {current_state}, focusing on gear restrictions and daily limits.
  expected_output: >
    A detailed legal breakdown containing:
    1. A Location Header explicitly confirming the target destination(s) analyzed.
    2. A clear bulleted list of current legal hook types, bait restrictions, and daily catch/size limits matching those exact waters.

prescribe_lures_task:
  description: >
    Using the specific targets, behavioral analysis, and compliance guardrails generated in the previous tasks, prescribe exactly 3 tackle setups optimized for catching {target_fish} in those targeted waters.
  expected_output: >
    The output MUST be formatted into two distinct sections:
    
    ### 🚨 Regional Legal Compliance Guardrails & Location Data
    [Include the compliance officer's specific location confirmation or recommendations, followed by the legal rules, hook requirements, bait bans, and daily catch limits for those exact spots].
    
    ### 🎣 Tactical Strategy Plan
    [Provide exactly 3 highly specific configurations, including Lure type, Color Palette, Rigging, Target Depth, and Presentation Tips matching these conditions].
